version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookclub
      POSTGRES_PASSWORD: bookclub
      POSTGRES_DB: bookclub
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookclub"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://bookclub:bookclub@db:5432/bookclub
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app

volumes:
  pgdata:
