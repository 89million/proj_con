<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Book Club{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Lora', 'Georgia', 'serif'],
          },
          colors: {
            forest: {
              50:  '#f2f9f0',
              100: '#d9f0d4',
              200: '#acd9a4',
              300: '#75bc6a',
              400: '#4a9e3d',
              500: '#337a2b',
              600: '#215a1b',
              700: '#153d12',
              800: '#0c260b',
              900: '#061306',
            },
            sound: {
              50:  '#fdf5f7',
              100: '#fae0e7',
              200: '#f4b8c8',
              300: '#ea87a4',
              400: '#db5680',
              500: '#c42e5d',
              600: '#971f47',
              700: '#6a1231',
              800: '#3f0a1e',
              900: '#1f040f',
            },
          },
        },
      },
    }
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { background-color: #f2f9f0; }
    .drag-handle { cursor: grab; }
    .drag-handle:active { cursor: grabbing; }
    .sortable-ghost { opacity: 0.4; }
  </style>
</head>
<body class="text-forest-900 min-h-screen font-sans">

  <!-- Nav -->
  <nav class="bg-forest-700 text-white px-6 py-3 flex items-center justify-between shadow-md border-b border-forest-600">
    <a href="/" class="font-serif text-xl font-semibold tracking-tight">Book Club</a>
    <div class="flex items-center gap-4 text-sm">
      {% if user %}
        {% if user.avatar_url %}
          <img src="{{ user.avatar_url }}" class="w-8 h-8 rounded-full border-2 border-forest-400" alt="{{ user.name }}" />
        {% endif %}
        <span class="font-medium opacity-90">{{ user.name }}</span>
        {% if user.is_admin %}
          <a href="/admin" class="bg-forest-500 hover:bg-forest-400 px-3 py-1 rounded text-xs font-semibold transition">Admin</a>
        {% endif %}
        <a href="/auth/logout" class="hover:underline opacity-60 text-xs">Sign out</a>
      {% else %}
        <a href="/auth/login" class="bg-white text-forest-700 font-semibold px-4 py-1 rounded hover:bg-forest-50 transition">Sign in with Google</a>
      {% endif %}
    </div>
  </nav>

  {% block banner %}{% endblock %}

  <main class="max-w-3xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
