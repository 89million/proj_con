<!-- Mini bracket overview diagram -->
<div class="mt-3 overflow-x-auto">
  <div id="bracket-overview" class="relative" style="min-height: 100px;"></div>
</div>

<script>
(function() {
  // Matchup data from DB
  const matchups = [
    {% for m in matchups %}
    {
      id: {{ m.id }},
      round: {{ m.round }},
      position: {{ m.position }},
      bookA: { id: {{ m.book_a_id }}, title: {{ m.book_a.title | tojson }} },
      bookB: { id: {{ m.book_b_id }}, title: {{ m.book_b.title | tojson }} },
      winnerId: {{ m.winner_id or 'null' }},
      isBye: {{ 'true' if m.book_a_id == m.book_b_id else 'false' }},
    },
    {% endfor %}
  ];

  const seedMap = {
    {% for s in seeds %}
    {{ s.book_id }}: {{ s.seed }},
    {% endfor %}
  };

  const totalRounds = {{ total_rounds }};

  const container = document.getElementById('bracket-overview');
  if (!container || matchups.length === 0) return;

  // Layout constants
  const SLOT_H = 28;
  const SLOT_W = 140;
  const COL_GAP = 40;
  const ROW_GAP = 6;
  const CONNECTOR_W = 20;

  // Index real matchups by "round-position"
  const matchupIndex = {};
  matchups.forEach(m => { matchupIndex[m.round + '-' + m.position] = m; });

  // Compute the full bracket skeleton from round 1
  // Round 1 count is known (all matchups including byes exist in DB)
  const round1 = matchups.filter(m => m.round === 1).sort((a, b) => a.position - b.position);
  const round1Count = round1.length;

  // Build expected matchup count per round: round1Count, round1Count/2, ...
  const expectedCounts = {};
  for (let r = 1; r <= totalRounds; r++) {
    expectedCounts[r] = Math.ceil(round1Count / Math.pow(2, r - 1));
  }

  // Compute slot positions for the full skeleton
  const slotPositions = {}; // "round-position-slot" -> {x, y}

  // Place round 1
  let y = 0;
  for (let p = 1; p <= round1Count; p++) {
    slotPositions['1-' + p + '-0'] = { x: 0, y: y };
    slotPositions['1-' + p + '-1'] = { x: 0, y: y + SLOT_H };
    y += SLOT_H * 2 + ROW_GAP;
  }

  // Place subsequent rounds — center between feeder pairs
  for (let r = 2; r <= totalRounds; r++) {
    const count = expectedCounts[r];
    const x = (r - 1) * (SLOT_W + COL_GAP + CONNECTOR_W);

    for (let i = 0; i < count; i++) {
      const pos = i + 1;
      // Feeder positions from previous round
      const f1Pos = i * 2 + 1;
      const f2Pos = i * 2 + 2;
      const f1Top = slotPositions[(r-1) + '-' + f1Pos + '-0'];
      const f2Bot = slotPositions[(r-1) + '-' + f2Pos + '-1'];

      let midY;
      if (f1Top && f2Bot) {
        midY = (f1Top.y + f2Bot.y + SLOT_H) / 2 - SLOT_H;
      } else if (f1Top) {
        midY = f1Top.y;
      } else {
        midY = i * (SLOT_H * 2 + ROW_GAP);
      }

      slotPositions[r + '-' + pos + '-0'] = { x: x, y: midY };
      slotPositions[r + '-' + pos + '-1'] = { x: x, y: midY + SLOT_H };
    }
  }

  // Compute total dimensions
  let maxX = 0, maxY = 0;
  Object.values(slotPositions).forEach(p => {
    if (p.x + SLOT_W > maxX) maxX = p.x + SLOT_W;
    if (p.y + SLOT_H > maxY) maxY = p.y + SLOT_H;
  });
  container.style.width = maxX + 'px';
  container.style.height = (maxY + 10) + 'px';

  // Helper: truncate title
  function truncate(str, max) {
    return str.length > max ? str.substring(0, max - 1) + '…' : str;
  }

  // Render a single slot
  function renderSlot(bookId, title, x, y, style) {
    const div = document.createElement('div');
    div.style.cssText = 'position:absolute;left:' + x + 'px;top:' + y + 'px;width:' + SLOT_W + 'px;height:' + (SLOT_H - 2) + 'px;';
    div.className = 'flex items-center px-2 text-xs rounded border overflow-hidden whitespace-nowrap ';

    if (style === 'bye') {
      div.className += 'border-forest-100 bg-forest-50/50 text-forest-300';
    } else if (style === 'winner') {
      div.className += 'border-forest-400 bg-forest-100 text-forest-700 font-semibold';
    } else if (style === 'loser') {
      div.className += 'border-forest-100 bg-white text-forest-200 line-through';
    } else if (style === 'tbd') {
      div.className += 'border-dashed border-forest-100 bg-forest-50/30 text-forest-200 italic';
    } else {
      div.className += 'border-forest-200 bg-white text-forest-700';
    }

    if (style === 'tbd') {
      div.textContent = 'TBD';
    } else {
      const seed = seedMap[bookId];
      div.textContent = (seed ? '#' + seed + ' ' : '') + truncate(title, 16);
      div.title = title;
    }
    container.appendChild(div);
  }

  // SVG overlay for connector lines
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.style.cssText = 'position:absolute;top:0;left:0;width:' + maxX + 'px;height:' + (maxY + 10) + 'px;pointer-events:none;';
  container.appendChild(svg);

  function drawConnector(x1, y1, x2, y2, dashed) {
    const midX = (x1 + x2) / 2;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M' + x1 + ',' + y1 + ' H' + midX + ' V' + y2 + ' H' + x2);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', dashed ? '#d4e8d0' : '#acd9a4');
    path.setAttribute('stroke-width', '1.5');
    if (dashed) path.setAttribute('stroke-dasharray', '4 3');
    svg.appendChild(path);
  }

  // Render the full skeleton
  for (let r = 1; r <= totalRounds; r++) {
    const count = expectedCounts[r];
    for (let i = 0; i < count; i++) {
      const pos = i + 1;
      const posA = slotPositions[r + '-' + pos + '-0'];
      const posB = slotPositions[r + '-' + pos + '-1'];
      const m = matchupIndex[r + '-' + pos];

      if (m) {
        // Real matchup exists in DB
        if (m.isBye) {
          renderSlot(m.bookA.id, m.bookA.title, posA.x, posA.y, 'bye');
          // Render empty bottom slot for visual pairing
          renderSlot(null, '', posB.x, posB.y, 'bye');
        } else {
          const aWon = m.winnerId === m.bookA.id;
          const bWon = m.winnerId === m.bookB.id;
          renderSlot(m.bookA.id, m.bookA.title, posA.x, posA.y, aWon ? 'winner' : bWon ? 'loser' : 'active');
          renderSlot(m.bookB.id, m.bookB.title, posB.x, posB.y, bWon ? 'winner' : aWon ? 'loser' : 'active');
        }
      } else {
        // Future matchup — show TBD placeholders
        renderSlot(null, '', posA.x, posA.y, 'tbd');
        renderSlot(null, '', posB.x, posB.y, 'tbd');
      }

      // Draw connector lines to next round (always, for the skeleton)
      if (r < totalRounds) {
        const nextPos = Math.ceil(pos / 2);
        const isTopFeeder = (pos - 1) % 2 === 0;
        const nextSlot = isTopFeeder ? 0 : 1;
        const target = slotPositions['' + (r + 1) + '-' + nextPos + '-' + nextSlot];

        if (target) {
          // If matchup has a winner, draw solid line from winner slot
          // Otherwise draw dashed line from midpoint of the pair
          if (m && m.winnerId) {
            const winnerIsA = m.winnerId === m.bookA.id;
            const fromSlot = winnerIsA ? posA : posB;
            drawConnector(fromSlot.x + SLOT_W, fromSlot.y + SLOT_H / 2, target.x, target.y + SLOT_H / 2, false);
          } else {
            // Dashed line from midpoint of pair to next slot
            const midY = posA.y + SLOT_H;
            drawConnector(posA.x + SLOT_W, midY, target.x, target.y + SLOT_H / 2, true);
          }
        }
      }
    }
  }
})();
</script>
