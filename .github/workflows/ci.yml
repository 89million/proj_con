name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: make install

      - name: Lint
        run: make lint
        env:
          GOOGLE_CLIENT_ID: ci-dummy
          GOOGLE_CLIENT_SECRET: ci-dummy
          SECRET_KEY: ci-dummy-secret-key-for-testing-only
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"

      - name: Test
        run: make test
        env:
          GOOGLE_CLIENT_ID: ci-dummy
          GOOGLE_CLIENT_SECRET: ci-dummy
          SECRET_KEY: ci-dummy-secret-key-for-testing-only
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
